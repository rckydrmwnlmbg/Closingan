version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: closingan-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: closingan-redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  api:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: closingan-api
    restart: always
    ports:
      - '${API_PORT}:${API_PORT}'
    environment:
      - NODE_ENV=development
      - PORT=${API_PORT}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis
    volumes:
      - ./apps/api:/app/apps/api
      - ./libs:/app/libs
      - /app/apps/api/node_modules

  web:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: closingan-web
    restart: always
    ports:
      - '${WEB_PORT}:${WEB_PORT}'
    environment:
      - NODE_ENV=development
      - PORT=${WEB_PORT}
      - NEXT_PUBLIC_API_URL=http://localhost:${API_PORT}
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - ./libs:/app/libs
      - /app/apps/web/node_modules

volumes:
  db_data:
  redis_data: